<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCC Rideau Canal Skateway Monitoring</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Rideau Canal Skateway Real-Time Monitor</h1>
        <p>System Status: <span id="sys-status">ONLINE</span> | Last Update: <span id="last-update">-</span></p>
    </header>

    <div class="dashboard-grid">
        <div class="card" id="card-DowsLake">
            <h2>Dow's Lake</h2>
            <div id="badge-DowsLake" class="badge">Loading...</div>
            <div class="stats">
                <p>Ice Thickness: <span id="ice-DowsLake">--</span></p>
                <p>Surface Temp: <span id="temp-DowsLake">--</span></p>
            </div>
        </div>

        <div class="card" id="card-FifthAve">
            <h2>Fifth Avenue</h2>
            <div id="badge-FifthAve" class="badge">Loading...</div>
            <div class="stats">
                <p>Ice Thickness: <span id="ice-FifthAve">--</span></p>
                <p>Surface Temp: <span id="temp-FifthAve">--</span></p>
            </div>
        </div>

        <div class="card" id="card-NAC">
            <h2>NAC</h2>
            <div id="badge-NAC" class="badge">Loading...</div>
            <div class="stats">
                <p>Ice Thickness: <span id="ice-NAC">--</span></p>
                <p>Surface Temp: <span id="temp-NAC">--</span></p>
            </div>
        </div>
    </div>

    <section class="chart-container">
        <h3>Historical Ice Thickness (Last Hour)</h3>
        <canvas id="iceChart"></canvas>
    </section>

    <script src="app.js"></script>
</body>
</html>
